# Configuração do Fly.io para o IPAB.
# Antes do primeiro deploy, ajuste `app` para o nome real criado por `fly launch`
# e `primary_region` para a região mais próxima (ex.: gru = São Paulo).

app = "ipaltobranco"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATA_DIR = "/data"

[[mounts]]
  source = "ipab_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
